<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OXFORD | Limpiador de Inyectores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos con la paleta correcta */
        .product-page { background-color: #F4EBD0; }
        .product-title { color: #122620; font-family: 'Playfair Display', serif; }
        .gold-text { color: #D6AD60; }
        .bronze-text { color: #B68D40; }
        .charcoal-bg { background-color: #122620; }
        .gold-border { border: 2px solid #D6AD60; }
        .gold-bg { background-color: #D6AD60; }
        .btn-oxford { background-color: #D6AD60; color: #122620; border-radius: 0; padding: 12px 30px; font-weight: 600; }
        .btn-oxford:hover { background-color: #B68D40; color: #F4EBD0; }
    </style>
</head>
<body class="product-page">
    <div id="navbar-container"></div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-6">
                <div class="gold-border p-2" style="background-color: white;">
                    <!-- IMAGEN TEMPORAL PRODUCTO 1 -->
                    <img src="https://images.pexels.com/photos/3862632/pexels-photo-3862632.jpeg" class="img-fluid" alt="Limpiador de Inyectores">
                    <p class="text-center bronze-text mt-2"><i></i></p>
                </div>
            </div>
            <div class="col-lg-6">
                <span class="bronze-text" style="letter-spacing: 3px;">INYECCIÓN DIRECTA</span>
                <h1 class="display-3 fw-bold product-title">Limpiador de <span class="gold-text">Inyectores</span></h1>
                
                <!-- Barra de concentración -->
                <div class="mt-4">
                    <div class="d-flex justify-content-between">
                        <span style="color: #122620;">Concentración PEA</span>
                        <span class="gold-text fw-bold">98%</span>
                    </div>
                    <div class="progress mt-2" style="height: 8px; background-color: #F4EBD0;">
                        <div class="progress-bar" style="width: 98%; background-color: #D6AD60;"></div>
                    </div>
                </div>
                
                <!-- Especificaciones rápidas -->
                <div class="row mt-4">
                    <div class="col-6 mb-3">
                        <div style="background-color: white; border: 1px solid #D6AD60; padding: 15px;">
                            <i class="bi bi-droplet-half" style="color: #D6AD60; font-size: 1.5rem;"></i>
                            <div><small style="color: #B68D40;">VOLUMEN</small></div>
                            <strong style="color: #122620;">500 ml</strong>
                        </div>
                    </div>
                    <div class="col-6 mb-3">
                        <div style="background-color: white; border: 1px solid #D6AD60; padding: 15px;">
                            <i class="bi bi-calculator" style="color: #D6AD60; font-size: 1.5rem;"></i>
                            <div><small style="color: #B68D40;">DOSIS</small></div>
                            <strong style="color: #122620;">37.73 ml</strong>
                        </div>
                    </div>
                </div>
                
                <!-- Lista de beneficios -->
                <ul class="list-unstyled mt-4">
                    <li class="mb-2"><i class="bi bi-check-circle-fill me-2" style="color: #D6AD60;"></i> Elimina el 95% de depósitos en inyectores</li>
                    <li class="mb-2"><i class="bi bi-check-circle-fill me-2" style="color: #D6AD60;"></i> Reduce el consumo hasta un 12%</li>
                    <li class="mb-2"><i class="bi bi-check-circle-fill me-2" style="color: #D6AD60;"></i> Compatible con motores gasolina y diésel</li>
                    <li class="mb-2"><i class="bi bi-check-circle-fill me-2" style="color: #D6AD60;"></i> Seguro para catalizadores y sensores</li>
                </ul>
                
                <!-- Precio -->
                <div class="charcoal-bg p-4 mt-4" style="border-left: 5px solid #D6AD60;">
                    <span style="color: #D6AD60; letter-spacing: 2px;">PRECIO</span>
                    <div class="d-flex align-items-baseline">
                        <span class="display-3 fw-bold" style="color: #D6AD60;">$37.73</span>
                        <span class="ms-2" style="color: #F4EBD0;">/ unidad</span>
                    </div>
                    <button class="btn-oxford btn w-100 mt-3">AÑADIR AL CARRITO</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
